# Build Sky Blitz with the correct base path for GitHub Project Pages:
# https://<user>.github.io/<repository>/
#
# Repo Settings → Pages → Source: GitHub Actions (not "Deploy from a branch" unless you upload dist yourself).

name: Deploy Sky Blitz to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "artifacts/airplane-shooter/**"
      - ".github/workflows/github-pages-airplane-shooter.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-airplane-shooter
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Must match the pnpm major that generated pnpm-lock.yaml (pnpm 9 vs 10 treat overrides differently).
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (BASE_PATH = /repository-name/)
        working-directory: artifacts/airplane-shooter
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
        run: pnpm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/airplane-shooter/dist/public

      - id: deployment
        uses: actions/deploy-pages@v4
